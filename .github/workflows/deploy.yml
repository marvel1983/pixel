name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4.2.3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront (static)
        run: pnpm --filter @workspace/storefront run build
        env:
          NODE_ENV: production
          PORT: 3000
          BASE_PATH: /

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        env:
          NODE_ENV: production

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          port: ${{ secrets.CONTABO_PORT || 22 }}
          envs: APP_PUBLIC_URL,STORE_PUBLIC_URL
          script: |
            set -e
            cd /var/www/pixel-storefront

            echo "→ Updating env vars..."
            ENV_FILE="/var/www/pixel-storefront/.env"
            touch "$ENV_FILE"
            for VAR in APP_PUBLIC_URL STORE_PUBLIC_URL; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" "$ENV_FILE"; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" "$ENV_FILE"
                else
                  echo "${VAR}=${VAL}" >> "$ENV_FILE"
                fi
              fi
            done

            echo "→ Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "→ Installing dependencies..."
            export PNPM_HOME="/root/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            pnpm install --frozen-lockfile

            echo "→ Installing Chrome system dependencies for puppeteer..."
            apt-get install -y --no-install-recommends \
              libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libdbus-1-3 libxcb1 libxkbcommon0 \
              libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
              libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 \
              libatspi2.0-0 2>/dev/null || true

            echo "→ Fixing @swc/helpers symlink for pdfkit/fontkit bundling..."
            mkdir -p /var/www/pixel-storefront/node_modules/@swc
            SWC_PATH=$(ls -d /var/www/pixel-storefront/node_modules/.pnpm/@swc+helpers@*/node_modules/@swc/helpers 2>/dev/null | head -1)
            if [ -n "$SWC_PATH" ]; then
              ln -sfn "$SWC_PATH" /var/www/pixel-storefront/node_modules/@swc/helpers
              echo "✓ @swc/helpers symlink → $SWC_PATH"
            else
              echo "⚠ @swc/helpers not found in pnpm store — skipping symlink"
            fi

            echo "→ Building storefront..."
            PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/storefront run build

            echo "→ Building API server..."
            NODE_ENV=production pnpm --filter @workspace/api-server run build

            echo "→ Copying pdfkit font data into dist (required for invoice PDF)..."
            PDFKIT_DATA=$(ls -d /var/www/pixel-storefront/node_modules/.pnpm/pdfkit@*/node_modules/pdfkit/js/data 2>/dev/null | head -1)
            if [ -n "$PDFKIT_DATA" ]; then
              cp -r "$PDFKIT_DATA" /var/www/pixel-storefront/artifacts/api-server/dist/data
              echo "✓ pdfkit data copied from $PDFKIT_DATA"
            else
              echo "⚠ pdfkit data not found — skipping"
            fi

            echo "→ Building shared libs..."
            pnpm run typecheck:libs || true

            echo "→ Applying safe DB schema additions..."
            set -a; source /var/www/pixel-storefront/.env; set +a

            echo "→ Adding new site_settings columns (safe, idempotent)..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_address VARCHAR(300);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_city VARCHAR(120);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_country VARCHAR(100);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_zip VARCHAR(20);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_tax_id VARCHAR(100);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS billing_snapshot JSONB;" || true

            echo "→ Enabling backorder on all active variants..."
            psql "$DATABASE_URL" -c "UPDATE product_variants SET backorder_allowed = true WHERE is_active = true;" || true

            echo "→ Adding PARTIALLY_DELIVERED to order_status enum..."
            psql "$DATABASE_URL" -c "ALTER TYPE order_status ADD VALUE IF NOT EXISTS 'PARTIALLY_DELIVERED';" || true

            echo "→ Adding risk hold columns to orders..."
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_hold BOOLEAN NOT NULL DEFAULT false;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_score INTEGER;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_reasons JSONB;" || true
            psql "$DATABASE_URL" -c "ALTER TYPE order_status ADD VALUE IF NOT EXISTS 'HELD';" || true

            echo "→ Adding Turnstile columns to site_settings..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_enabled BOOLEAN NOT NULL DEFAULT false;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_site_key VARCHAR(500);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_secret_key TEXT;" || true

            echo "→ Adding risk_config column to site_settings..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS risk_config JSONB;" || true

            echo "→ Adding processing_fee_tiers column to site_settings..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS processing_fee_tiers JSONB;" || true

            echo "→ Adding activation_instructions column to products..."
            psql "$DATABASE_URL" -c "ALTER TABLE products ADD COLUMN IF NOT EXISTS activation_instructions TEXT;" || true

            echo "→ Widening short_description to TEXT (was varchar 500)..."
            psql "$DATABASE_URL" -c "ALTER TABLE products ALTER COLUMN short_description TYPE TEXT;" || true

            # The DATABASE_URL has special characters in password that break psql's URL parser
            # (we've inherited this — the existing psql "$DATABASE_URL" lines above silently fail).
            # Parse explicit connection params here so subsequent migrations actually run.
            export PGPASSWORD="$(python3 -c "import os, re; m=re.match(r'postgresql://[^:]+:(.+)@[^:/]+:\\d+/.+', os.environ['DATABASE_URL']); print(m.group(1))")"
            PG_HOST="$(python3 -c "import os, re; m=re.match(r'postgresql://[^:]+:.+@([^:/]+):\\d+/.+', os.environ['DATABASE_URL']); print(m.group(1))")"
            PG_USER="$(python3 -c "import os, re; m=re.match(r'postgresql://([^:]+):.+@.+', os.environ['DATABASE_URL']); print(m.group(1))")"
            PG_DB="$(python3 -c "import os, re; m=re.match(r'postgresql://[^:]+:.+@[^:/]+:\\d+/(.+)', os.environ['DATABASE_URL']); print(m.group(1))")"
            PSQL="psql -h $PG_HOST -U $PG_USER -d $PG_DB"

            echo "→ Adding stuck_alert_sent_at column to orders..."
            $PSQL -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS stuck_alert_sent_at TIMESTAMP;" || true

            echo "→ Creating metenzi_webhook_events table..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS metenzi_webhook_events (
                id SERIAL PRIMARY KEY,
                event_type VARCHAR(80) NOT NULL,
                metenzi_order_id VARCHAR(100),
                related_order_id INTEGER REFERENCES orders(id) ON DELETE SET NULL,
                raw_payload JSONB NOT NULL,
                received_at TIMESTAMP NOT NULL DEFAULT NOW(),
                processed_at TIMESTAMP,
                success BOOLEAN,
                error_msg TEXT,
                outcome_note VARCHAR(200)
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS metenzi_webhook_events_received_at_idx ON metenzi_webhook_events(received_at);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS metenzi_webhook_events_metenzi_order_id_idx ON metenzi_webhook_events(metenzi_order_id);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS metenzi_webhook_events_related_order_id_idx ON metenzi_webhook_events(related_order_id);" || true

            echo "→ Adding disabled column to metenzi_product_mappings..."
            $PSQL -c "ALTER TABLE metenzi_product_mappings ADD COLUMN IF NOT EXISTS disabled BOOLEAN NOT NULL DEFAULT FALSE;" || true

            echo "→ Creating metenzi_mapping_conflicts table..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS metenzi_mapping_conflicts (
                id SERIAL PRIMARY KEY,
                conflict_type VARCHAR(50) NOT NULL,
                metenzi_product_id VARCHAR(100) NOT NULL,
                metenzi_sku VARCHAR(100),
                metenzi_name VARCHAR(300),
                raw_payload JSONB NOT NULL,
                candidate_pixel_product_id INTEGER REFERENCES products(id) ON DELETE SET NULL,
                candidate_mapping_id INTEGER REFERENCES metenzi_product_mappings(id) ON DELETE SET NULL,
                similarity_score NUMERIC(5,2),
                status VARCHAR(20) NOT NULL DEFAULT 'pending',
                resolution_note TEXT,
                resolved_by INTEGER REFERENCES users(id),
                resolved_at TIMESTAMP,
                created_at TIMESTAMP NOT NULL DEFAULT NOW(),
                updated_at TIMESTAMP NOT NULL DEFAULT NOW()
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS metenzi_mapping_conflicts_status_idx ON metenzi_mapping_conflicts(status);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS metenzi_mapping_conflicts_metenzi_id_idx ON metenzi_mapping_conflicts(metenzi_product_id);" || true

            echo "→ Creating payment_attempt_status enum..."
            $PSQL -c "DO \$\$ BEGIN
              CREATE TYPE payment_attempt_status AS ENUM ('REQUIRES_ACTION', 'PROCESSING', 'SUCCEEDED', 'FAILED', 'CANCELED');
            EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;" || true

            echo "→ Creating payment_attempts table..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS payment_attempts (
                id SERIAL PRIMARY KEY,
                order_id INTEGER NOT NULL REFERENCES orders(id) ON DELETE CASCADE,
                provider VARCHAR(32) NOT NULL DEFAULT 'stripe',
                payment_intent_id VARCHAR(255),
                charge_id VARCHAR(255),
                status payment_attempt_status NOT NULL,
                amount_usd NUMERIC(10,2),
                currency VARCHAR(8),
                card_brand VARCHAR(32),
                card_last4 VARCHAR(4),
                card_exp_month INTEGER,
                card_exp_year INTEGER,
                card_country VARCHAR(2),
                card_funding VARCHAR(16),
                failure_code VARCHAR(64),
                decline_code VARCHAR(64),
                failure_message TEXT,
                outcome_network_status VARCHAR(64),
                outcome_reason VARCHAR(64),
                outcome_risk_level VARCHAR(32),
                outcome_seller_message TEXT,
                three_ds_result VARCHAR(64),
                three_ds_authentication_flow VARCHAR(32),
                three_ds_version VARCHAR(16),
                event_type VARCHAR(64),
                raw_event_id VARCHAR(255) UNIQUE,
                raw_payload JSONB,
                occurred_at TIMESTAMP NOT NULL,
                created_at TIMESTAMP NOT NULL DEFAULT NOW()
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS payment_attempts_order_id_idx ON payment_attempts(order_id);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS payment_attempts_payment_intent_id_idx ON payment_attempts(payment_intent_id);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS payment_attempts_status_idx ON payment_attempts(status);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS payment_attempts_occurred_at_idx ON payment_attempts(occurred_at);" || true

            echo "→ Creating tracking_sessions table (customer journey)..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS tracking_sessions (
                id VARCHAR(36) PRIMARY KEY,
                user_id INTEGER REFERENCES users(id) ON DELETE SET NULL,
                ip_address VARCHAR(45),
                user_agent TEXT,
                geo_country VARCHAR(2),
                device_type VARCHAR(20),
                referrer TEXT,
                utm_source VARCHAR(100),
                utm_medium VARCHAR(100),
                utm_campaign VARCHAR(100),
                started_at TIMESTAMP NOT NULL DEFAULT NOW(),
                last_seen_at TIMESTAMP NOT NULL DEFAULT NOW(),
                ended_at TIMESTAMP
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS tracking_sessions_user_idx ON tracking_sessions(user_id);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS tracking_sessions_last_seen_idx ON tracking_sessions(last_seen_at);" || true

            echo "→ Creating tracking_events table (customer journey)..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS tracking_events (
                id SERIAL PRIMARY KEY,
                session_id VARCHAR(36) NOT NULL,
                user_id INTEGER REFERENCES users(id) ON DELETE SET NULL,
                event_type VARCHAR(50) NOT NULL,
                page_path TEXT,
                metadata JSONB,
                occurred_at TIMESTAMP NOT NULL,
                received_at TIMESTAMP NOT NULL DEFAULT NOW()
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS tracking_events_session_time_idx ON tracking_events(session_id, occurred_at);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS tracking_events_type_time_idx ON tracking_events(event_type, occurred_at);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS tracking_events_user_time_idx ON tracking_events(user_id, occurred_at);" || true

            echo "→ Creating cart_state_snapshots table (customer journey)..."
            $PSQL -c "
              CREATE TABLE IF NOT EXISTS cart_state_snapshots (
                id SERIAL PRIMARY KEY,
                session_id VARCHAR(36) NOT NULL,
                user_id INTEGER REFERENCES users(id) ON DELETE SET NULL,
                trigger_event VARCHAR(50) NOT NULL,
                items JSONB NOT NULL,
                totals JSONB NOT NULL,
                captured_at TIMESTAMP NOT NULL DEFAULT NOW()
              );" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS cart_snapshots_session_time_idx ON cart_state_snapshots(session_id, captured_at);" || true

            echo "→ Adding session_id to orders (customer journey)..."
            $PSQL -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS session_id VARCHAR(36);" || true
            $PSQL -c "CREATE INDEX IF NOT EXISTS orders_session_id_idx ON orders(session_id);" || true

            echo "→ Adding billing + referral columns to users (idempotent)..."
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS date_of_birth DATE;" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS referred_by_user_id INTEGER;" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_country VARCHAR(3);" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_city VARCHAR(120);" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_address VARCHAR(500);" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_zip VARCHAR(32);" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_vat_number VARCHAR(50);" || true
            $PSQL -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS billing_phone VARCHAR(40);" || true

            echo "→ Adding loyalty_settings columns (idempotent)..."
            $PSQL -c "ALTER TABLE loyalty_settings ADD COLUMN IF NOT EXISTS expiry_warning_days INTEGER NOT NULL DEFAULT 30;" || true
            $PSQL -c "ALTER TABLE loyalty_settings ADD COLUMN IF NOT EXISTS birthday_bonus INTEGER NOT NULL DEFAULT 200;" || true
            $PSQL -c "ALTER TABLE loyalty_settings ADD COLUMN IF NOT EXISTS referral_bonus INTEGER NOT NULL DEFAULT 500;" || true

            echo "→ Backfilling product review aggregates from approved reviews..."
            $PSQL -c "UPDATE products p SET review_count = COALESCE(s.cnt, 0), avg_rating = COALESCE(s.avg, 0) FROM (SELECT product_id, COUNT(*)::int AS cnt, ROUND(AVG(rating)::numeric, 2) AS avg FROM reviews WHERE status = 'APPROVED' GROUP BY product_id) s WHERE p.id = s.product_id;" || true
            $PSQL -c "UPDATE products SET review_count = 0, avg_rating = 0 WHERE id NOT IN (SELECT product_id FROM reviews WHERE status = 'APPROVED');" || true

            echo "→ Adding bundle pricing columns + bundle_discount_type enum (idempotent)..."
            $PSQL -c "DO \$\$ BEGIN CREATE TYPE bundle_discount_type AS ENUM ('PERCENTAGE', 'FIXED', 'BUY_X_GET_Y_FREE'); EXCEPTION WHEN duplicate_object THEN null; END \$\$;" || true
            $PSQL -c "ALTER TABLE bundles ADD COLUMN IF NOT EXISTS primary_product_id INTEGER REFERENCES products(id) ON DELETE SET NULL;" || true
            $PSQL -c "ALTER TABLE bundles ADD COLUMN IF NOT EXISTS discount_type bundle_discount_type NOT NULL DEFAULT 'FIXED';" || true
            $PSQL -c "ALTER TABLE bundles ADD COLUMN IF NOT EXISTS discount_value NUMERIC(10,2) NOT NULL DEFAULT 0;" || true
            $PSQL -c "ALTER TABLE bundles ADD COLUMN IF NOT EXISTS min_primary_qty INTEGER NOT NULL DEFAULT 1;" || true

            echo "→ Backfilling existing bundles (FIXED type with discount = sumOfItems - bundlePriceUsd)..."
            $PSQL -c "UPDATE bundles b SET discount_value = GREATEST(0, COALESCE(s.sum_prices, 0) - b.bundle_price_usd) FROM (SELECT bi.bundle_id, SUM(COALESCE(p.avg_rating, 0) * 0 + (SELECT MIN(pv.price_usd::numeric) FROM product_variants pv WHERE pv.product_id = bi.product_id AND pv.is_active = true)) AS sum_prices FROM bundle_items bi JOIN products p ON p.id = bi.product_id GROUP BY bi.bundle_id) s WHERE b.id = s.bundle_id AND b.discount_value = 0;" || true
            $PSQL -c "UPDATE bundles b SET primary_product_id = (SELECT product_id FROM bundle_items WHERE bundle_id = b.id ORDER BY sort_order ASC LIMIT 1) WHERE primary_product_id IS NULL;" || true

            echo "→ Bundles rev-2: anchor-as-wrapper model migrations..."
            $PSQL -c "ALTER TABLE products ADD COLUMN IF NOT EXISTS is_bundle_anchor BOOLEAN NOT NULL DEFAULT false;" || true
            $PSQL -c "ALTER TABLE bundle_items ADD COLUMN IF NOT EXISTS is_free BOOLEAN NOT NULL DEFAULT false;" || true
            echo "→ Removing anchor rows from bundle_items (anchor is wrapper, not a component)..."
            $PSQL -c "DELETE FROM bundle_items bi USING bundles b WHERE bi.bundle_id = b.id AND bi.product_id = b.primary_product_id;" || true
            echo "→ Marking anchor products with is_bundle_anchor = true..."
            $PSQL -c "UPDATE products SET is_bundle_anchor = true WHERE id IN (SELECT DISTINCT primary_product_id FROM bundles WHERE primary_product_id IS NOT NULL) AND is_bundle_anchor = false;" || true
            echo "→ Adding use_anchor_price column to bundles (default false)..."
            $PSQL -c "ALTER TABLE bundles ADD COLUMN IF NOT EXISTS use_anchor_price BOOLEAN NOT NULL DEFAULT false;" || true

            echo "→ pSEO: product_seo_content table for /buy/:slug landing pages..."
            $PSQL -c "CREATE TABLE IF NOT EXISTS product_seo_content (
              id SERIAL PRIMARY KEY,
              product_id INTEGER NOT NULL REFERENCES products(id) ON DELETE CASCADE,
              intro TEXT NOT NULL,
              why_buy JSONB NOT NULL DEFAULT '[]',
              faq JSONB NOT NULL DEFAULT '[]',
              activation_steps JSONB NOT NULL DEFAULT '[]',
              generated_at TIMESTAMP NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMP NOT NULL DEFAULT NOW()
            );" || true
            $PSQL -c "CREATE UNIQUE INDEX IF NOT EXISTS product_seo_content_product_id_uq ON product_seo_content (product_id);" || true

            echo "→ Metenzi mappings: allow 1 Metenzi product → N Pixel products..."
            # Drop the old single-column unique constraint (and its auto-named index)
            # in either form Postgres might have stored it under.
            $PSQL -c "ALTER TABLE metenzi_product_mappings DROP CONSTRAINT IF EXISTS metenzi_product_mappings_metenzi_product_id_unique;" || true
            $PSQL -c "ALTER TABLE metenzi_product_mappings DROP CONSTRAINT IF EXISTS metenzi_product_mappings_metenzi_product_id_key;" || true
            $PSQL -c "DROP INDEX IF EXISTS metenzi_product_mappings_metenzi_product_id_unique;" || true
            $PSQL -c "DROP INDEX IF EXISTS metenzi_product_mappings_metenzi_product_id_key;" || true
            # Add the new composite unique on (metenzi_product_id, pixel_product_id).
            $PSQL -c "CREATE UNIQUE INDEX IF NOT EXISTS metenzi_product_mappings_pair_uq ON metenzi_product_mappings (metenzi_product_id, pixel_product_id);" || true

            echo "→ Adding max_qty_per_order to product_variants..."
            $PSQL -c "ALTER TABLE product_variants ADD COLUMN IF NOT EXISTS max_qty_per_order INTEGER;" || true

            echo "→ Reloading PM2..."
            set -a; source /var/www/pixel-storefront/.env; set +a
            pm2 reload pixel-api --update-env

            echo "→ Syncing Nginx config..."
            cp /var/www/pixel-storefront/nginx/pixel-storefront.conf /etc/nginx/sites-available/pixel-storefront
            ln -sf /etc/nginx/sites-available/pixel-storefront /etc/nginx/sites-enabled/pixel-storefront
            nginx -t && systemctl reload nginx

            echo "→ Saving PM2 config..."
            pm2 save

            echo "✓ Deployment complete!"
