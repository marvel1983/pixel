name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4.2.3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront (static)
        run: pnpm --filter @workspace/storefront run build
        env:
          NODE_ENV: production
          PORT: 3000
          BASE_PATH: /

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        env:
          NODE_ENV: production

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          port: ${{ secrets.CONTABO_PORT || 22 }}
          envs: APP_PUBLIC_URL,STORE_PUBLIC_URL
          script: |
            set -e
            cd /var/www/pixel-storefront

            echo "→ Updating env vars..."
            ENV_FILE="/var/www/pixel-storefront/.env"
            touch "$ENV_FILE"
            for VAR in APP_PUBLIC_URL STORE_PUBLIC_URL; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" "$ENV_FILE"; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" "$ENV_FILE"
                else
                  echo "${VAR}=${VAL}" >> "$ENV_FILE"
                fi
              fi
            done

            echo "→ Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "→ Installing dependencies..."
            export PNPM_HOME="/root/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            pnpm install --frozen-lockfile

            echo "→ Installing Chrome system dependencies for puppeteer..."
            apt-get install -y --no-install-recommends \
              libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libdbus-1-3 libxcb1 libxkbcommon0 \
              libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
              libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 \
              libatspi2.0-0 2>/dev/null || true

            echo "→ Fixing @swc/helpers symlink for pdfkit/fontkit bundling..."
            mkdir -p /var/www/pixel-storefront/node_modules/@swc
            SWC_PATH=$(ls -d /var/www/pixel-storefront/node_modules/.pnpm/@swc+helpers@*/node_modules/@swc/helpers 2>/dev/null | head -1)
            if [ -n "$SWC_PATH" ]; then
              ln -sfn "$SWC_PATH" /var/www/pixel-storefront/node_modules/@swc/helpers
              echo "✓ @swc/helpers symlink → $SWC_PATH"
            else
              echo "⚠ @swc/helpers not found in pnpm store — skipping symlink"
            fi

            echo "→ Building storefront..."
            PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/storefront run build

            echo "→ Building API server..."
            NODE_ENV=production pnpm --filter @workspace/api-server run build

            echo "→ Copying pdfkit font data into dist (required for invoice PDF)..."
            PDFKIT_DATA=$(ls -d /var/www/pixel-storefront/node_modules/.pnpm/pdfkit@*/node_modules/pdfkit/js/data 2>/dev/null | head -1)
            if [ -n "$PDFKIT_DATA" ]; then
              cp -r "$PDFKIT_DATA" /var/www/pixel-storefront/artifacts/api-server/dist/data
              echo "✓ pdfkit data copied from $PDFKIT_DATA"
            else
              echo "⚠ pdfkit data not found — skipping"
            fi

            echo "→ Building shared libs..."
            pnpm run typecheck:libs || true

            echo "→ Applying safe DB schema additions..."
            set -a; source /var/www/pixel-storefront/.env; set +a

            echo "→ Adding new site_settings columns (safe, idempotent)..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_address VARCHAR(300);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_city VARCHAR(120);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_country VARCHAR(100);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_zip VARCHAR(20);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS company_tax_id VARCHAR(100);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS billing_snapshot JSONB;" || true

            echo "→ Enabling backorder on all active variants..."
            psql "$DATABASE_URL" -c "UPDATE product_variants SET backorder_allowed = true WHERE is_active = true;" || true

            echo "→ Adding PARTIALLY_DELIVERED to order_status enum..."
            psql "$DATABASE_URL" -c "ALTER TYPE order_status ADD VALUE IF NOT EXISTS 'PARTIALLY_DELIVERED';" || true

            echo "→ Adding risk hold columns to orders..."
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_hold BOOLEAN NOT NULL DEFAULT false;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_score INTEGER;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS risk_reasons JSONB;" || true
            psql "$DATABASE_URL" -c "ALTER TYPE order_status ADD VALUE IF NOT EXISTS 'HELD';" || true

            echo "→ Adding Turnstile columns to site_settings..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_enabled BOOLEAN NOT NULL DEFAULT false;" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_site_key VARCHAR(500);" || true
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS turnstile_secret_key TEXT;" || true

            echo "→ Adding risk_config column to site_settings..."
            psql "$DATABASE_URL" -c "ALTER TABLE site_settings ADD COLUMN IF NOT EXISTS risk_config JSONB;" || true

            echo "→ Reloading PM2..."
            set -a; source /var/www/pixel-storefront/.env; set +a
            pm2 reload pixel-api --update-env

            echo "→ Syncing Nginx config..."
            cp /var/www/pixel-storefront/nginx/pixel-storefront.conf /etc/nginx/sites-available/pixel-storefront
            ln -sf /etc/nginx/sites-available/pixel-storefront /etc/nginx/sites-enabled/pixel-storefront
            nginx -t && systemctl reload nginx

            echo "→ Saving PM2 config..."
            pm2 save

            echo "✓ Deployment complete!"
