name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront (static)
        run: pnpm --filter @workspace/storefront run build
        env:
          NODE_ENV: production
          PORT: 3000
          BASE_PATH: /

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        env:
          NODE_ENV: production

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_PORT || 22 }}
          script: |
            set -e
            cd /var/www/pixel-storefront

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Installing dependencies..."
            export PNPM_HOME="/root/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            pnpm install --frozen-lockfile

            echo "→ Building storefront..."
            PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/storefront run build

            echo "→ Building API server..."
            NODE_ENV=production pnpm --filter @workspace/api-server run build

            echo "→ Building shared libs..."
            pnpm run typecheck:libs || true

            echo "→ Pushing DB schema..."
            source /var/www/pixel-storefront/.env
            pnpm --filter @workspace/db run push

            echo "→ Reloading PM2..."
            pm2 reload pixel-api --update-env

            echo "→ Saving PM2 config..."
            pm2 save

            echo "✓ Deployment complete!"
