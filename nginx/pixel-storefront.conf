# ── Crawler detection for bot-aware SSR ───────────────────────────────────────
# Search-engine + AI + social-unfurl bots get a server-rendered snapshot
# (Express /__ssr) so they index real <title>/meta/JSON-LD/content instead of
# the empty SPA shell. Humans keep the fast static SPA untouched.
map $http_user_agent $is_crawler {
    default                 0;
    "~*googlebot"           1;
    "~*bingbot"             1;
    "~*yandex"              1;
    "~*duckduckbot"         1;
    "~*baiduspider"         1;
    "~*slurp"               1;
    "~*applebot"            1;
    "~*facebookexternalhit" 1;
    "~*facebot"             1;
    "~*twitterbot"          1;
    "~*linkedinbot"         1;
    "~*whatsapp"            1;
    "~*telegrambot"         1;
    "~*slackbot"            1;
    "~*discordbot"          1;
    "~*pinterest"           1;
    "~*redditbot"           1;
    "~*gptbot"              1;
    "~*oai-searchbot"       1;
    "~*chatgpt-user"        1;
    "~*perplexitybot"       1;
    "~*claudebot"           1;
    "~*claude-web"          1;
    "~*anthropic-ai"        1;
    "~*google-extended"     1;
    "~*bytespider"          1;
    "~*ia_archiver"         1;
}

# ── Cloudflare real-IP restoration ────────────────────────────────────────────
# Without these, $remote_addr is a Cloudflare edge IP and rate limiting breaks.
# Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4)
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
# Cloudflare IPv6 ranges (https://www.cloudflare.com/ips-v6)
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
# ──────────────────────────────────────────────────────────────────────────────

# Rate limit zones (must be in http context — included via sites-enabled into http {})
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=checkout_rl:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS (non-www canonical)
server {
    listen 80;
    server_name pixelcodes.com www.pixelcodes.com;
    return 301 https://pixelcodes.com$request_uri;
}

# www → canonical HTTPS redirect
server {
    listen 443 ssl;
    server_name www.pixelcodes.com;

    ssl_certificate /etc/letsencrypt/live/pixelcodes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelcodes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://pixelcodes.com$request_uri;
}

# HTTPS — canonical
server {
    listen 443 ssl;
    server_name pixelcodes.com;

    ssl_certificate /etc/letsencrypt/live/pixelcodes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelcodes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/pixel-storefront/artifacts/storefront/dist/public;
    index index.html;

    client_max_body_size 260m;
    client_body_timeout 300s;
    proxy_send_timeout 300s;

    limit_conn conn_limit 40;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets — includes webp/avif
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache HTML (no-store removed to allow bfcache)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
    # Google Search Console verification file — served by Express from DB.
    # MUST precede the generic `\.html$` block: nginx evaluates regex
    # locations in file order and the first match wins, so a broader
    # `\.html$` rule above this would shadow it and 404 the GSC file.
    location ~* ^/google[a-z0-9]+\.html$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Sitemap — generated dynamically by Express from DB
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # On-demand WebP thumbnails — serve from disk, fall back to Express generator
    location ^~ /uploads/thumb/ {
        alias /var/www/pixel-storefront/uploads/thumb/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @thumb_proxy;
    }

    location @thumb_proxy {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-uploaded product images — served directly from disk
    location ^~ /uploads/ {
        alias /var/www/pixel-storefront/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth_rl burst=5 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Checkout/order endpoint — tightest limit
    location = /api/orders {
        limit_req zone=checkout_rl burst=2 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # All other API requests
    location /api/ {
        limit_req zone=api_rl burst=100 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # React SPA — humans get the static shell; crawlers get the SSR snapshot.
    location / {
        if ($is_crawler) {
            proxy_pass http://127.0.0.1:8080/__ssr$uri$is_args$args;
        }
        try_files $uri $uri/ /index.html;
    }
}
