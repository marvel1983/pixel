# Rate limit zones (must be in http context — included via sites-enabled into http {})
# General API: 60 requests/minute per IP (burst of 30 queued)
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=60r/m;
# Checkout: 5 requests/minute per IP (hard cap, no burst queue)
limit_req_zone $binary_remote_addr zone=checkout_rl:10m rate=5r/m;
# Auth endpoints: 10 requests/minute per IP
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;
# Concurrent connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name diginek.com www.diginek.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name diginek.com www.diginek.com;

    ssl_certificate /etc/letsencrypt/live/diginek.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diginek.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/pixel-storefront/artifacts/storefront/dist/public;
    index index.html;

    client_max_body_size 12m;

    # Max 40 concurrent connections per IP across the whole site
    limit_conn conn_limit 40;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache HTML
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # User-uploaded product images (downloaded from Metenzi) — served directly from disk
    location ^~ /uploads/ {
        alias /var/www/pixel-storefront/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth endpoints — strict rate limit (login, register, password reset)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth_rl burst=5 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Checkout/order endpoint — tightest limit
    location = /api/orders {
        limit_req zone=checkout_rl burst=2 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # All other API requests
    location /api/ {
        limit_req zone=api_rl burst=30 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # React SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
