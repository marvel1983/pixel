# Rate limit zones (must be in http context — included via sites-enabled into http {})
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=checkout_rl:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS (non-www canonical)
server {
    listen 80;
    server_name pixelcodes.com www.pixelcodes.com;
    return 301 https://pixelcodes.com$request_uri;
}

# www → canonical HTTPS redirect
server {
    listen 443 ssl;
    server_name www.pixelcodes.com;

    ssl_certificate /etc/letsencrypt/live/pixelcodes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelcodes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://pixelcodes.com$request_uri;
}

# HTTPS — canonical
server {
    listen 443 ssl;
    server_name pixelcodes.com;

    ssl_certificate /etc/letsencrypt/live/pixelcodes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelcodes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/pixel-storefront/artifacts/storefront/dist/public;
    index index.html;

    client_max_body_size 260m;
    client_body_timeout 300s;
    proxy_send_timeout 300s;

    limit_conn conn_limit 40;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets — includes webp/avif
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache HTML
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Sitemap — generated dynamically by Express from DB
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # On-demand WebP thumbnails — serve from disk, fall back to Express generator
    location ^~ /uploads/thumb/ {
        alias /var/www/pixel-storefront/uploads/thumb/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @thumb_proxy;
    }

    location @thumb_proxy {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-uploaded product images — served directly from disk
    location ^~ /uploads/ {
        alias /var/www/pixel-storefront/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth_rl burst=5 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Checkout/order endpoint — tightest limit
    location = /api/orders {
        limit_req zone=checkout_rl burst=2 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # All other API requests
    location /api/ {
        limit_req zone=api_rl burst=100 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
